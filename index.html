<style>
html { scroll-behavior:smooth; }

body {
  background:#0f172a;
  color:#e2e8f0;
  font-family:'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
  background: rgba(2,6,23,0.6)!important;
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.navbar.scrolled {
  background: rgba(2,6,23,0.9)!important;
}

/* NAV LINKS */
.nav-link {
  position:relative;
}
.nav-link::after {
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0%;
  height:2px;
  background:#38bdf8;
  transition:0.3s;
}
.nav-link:hover::after,
.nav-link.active::after {
  width:100%;
}
.nav-link.active {
  color:#38bdf8!important;
}

/* HERO */
.hero {
  padding:120px 20px;
  text-align:center;
}
.hero h1 { font-size:50px; }

/* BUTTONS */
.btn-custom, .btn-whatsapp {
  position: relative;
  overflow: hidden;
  border-radius: 30px;
  padding: 10px 25px;
  font-weight: 600;
  transition:0.4s;
  display:flex;
  align-items:center;
  gap:8px;
}

/* MAIL BUTTON */
.btn-custom {
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  color:black;
}
.btn-custom:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow:0 15px 35px rgba(56,189,248,0.6);
}

/* WHATSAPP BUTTON */
.btn-whatsapp {
  background: linear-gradient(45deg,#25D366,#1ebe5d);
  color:white;
}
.btn-whatsapp:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow:0 15px 35px rgba(37,211,102,0.6);
}

/* CARDS */
.card {
  background:#020617;
  border:none;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
}
.card:hover {
  transform:translateY(-10px) scale(1.03);
}

.img-box {
  height:200px;
  overflow:hidden;
}
.img-box img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SKILLS */
.badge {
  font-size:18px;
  padding:10px 18px;
  cursor:pointer;
}
.badge:hover {
  transform:scale(1.2);
  background:#38bdf8!important;
  color:black!important;
}

/* SOCIAL */
.social-icons a {
  font-size:22px;
  margin:0 10px;
  color:white;
  transition:0.3s;
}
.social-icons a:hover {
  color:#38bdf8;
  transform:scale(1.2);
}

.section-title {
  text-align:center;
  margin-bottom:40px;
}

/* SHOW MORE BUTTON */
#toggleBtn {
  padding:10px 25px;
  border-radius:30px;
  margin-top:20px;
}
#toggleBtn {
  background: linear-gradient(45deg, #25D366, #1ebe5d);
  border: none;
  padding: 12px;
  font-weight: 600;
  border-radius: 30px;
  transition: 0.4s;
}

#toggleBtn:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 25px rgba(37, 211, 102, 0.6);
}
</style>
</head>

<section id="projects" class="container py-5 text-center">

<div class="mt-4">
  <button id="toggleBtn" class="btn w-100 text-white text-center" onclick="toggleProjects()">
  Show More
</button>

<script>
const projects = [
  {img:"https://drive.google.com/thumbnail?id=1koTfRit4xN6k6P1z0gkDx7LCeFIWHgHs&sz=w1000", title:"Flyer"},
  {img:"https://drive.google.com/thumbnail?id=11jW4B72VSxA0KLHxbtdAGT6KO_EEFPGi&sz=w1000", title:"Thumbnail"},
  {img:"https://drive.google.com/thumbnail?id=15MPNE0U2ds5-19AnABMFIAE8DfyqjGiH&sz=w1000", title:"Thumbnail"},
  {img:"https://drive.google.com/thumbnail?id=1LKJccSyNshZxJUNZBQX91CjS2nh4R910&sz=w1000", title:"Thumbnail"},
  {img:"https://drive.google.com/thumbnail?id=1x4UHlXCov1E5OBTOdo9PG7WE-zJ1CFp6&sz=w1000", title:"Thumbnail"},
  {img:"https://drive.google.com/thumbnail?id=1n3Oyfmy4yspY19f70ic913tvx_fG1HTj&sz=w1000", title:"Thumbnail"},
  {img:"https://drive.google.com/thumbnail?id=1MpFeR5NWvYflGbeEgsDWZZ76lGveJIpX&sz=w1000", title:"Thumbnail"}
];

let showAll = false;

const container = document.getElementById("projectContainer");
const btn = document.getElementById("toggleBtn");

function renderProjects(){
  container.innerHTML = "";

  let data = showAll ? projects : projects.slice(0,6);

  data.forEach(p=>{
    container.innerHTML += `
    <div class="col-md-4 mb-4">
      <a href="${p.img}" target="_blank" style="text-decoration:none;color:inherit;">
        <div class="card">
          <div class="img-box">
            <img src="${p.img}">
          </div>
          <div class="p-3">
            <h5>${p.title}</h5>
          </div>
        </div>
      </a>
    </div>`;
  });

  btn.innerText = showAll ? "Show Less" : "Show More";
}

function toggleProjects(){
  showAll = !showAll;
  renderProjects();
}

renderProjects();
</script>
